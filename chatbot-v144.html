<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Honorways AI Assistant v1.44</title>
  <style>
    body {

    .chat-container {

}

.bot-message a:hover,
.message.bot a:hover,
.ai-message a:hover {

}
    
    .footer-branding {

      font-size: 13px;

    button {

      border: none;
      border-radius: 30px;

      color: white;

      flex-shrink: 0;

    button:hover {

@media (max-width: 768px) {
  .chat-container {
    width: 100%;
    height: 100dvh;
    border-radius: 0;

    font-size: 18px;
    padding: 14px;
  }

<body>

  <div class="chat-container">
    <div class="chat-header">Jobeth Salon AI Assistant (Demo v1.44)</div>
    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Type your message..."
        onkeypress="handleKeyPress(event)"
      />
      <button onclick="sendMessage()">Send</button>
    </div>
    <div class="footer-branding">Powered by HonorWays | v1.44</div>
  </div>

  <script>
    // 🔧 REPLACE WITH YOUR MAKE WEBHOOK URL
    const WEBHOOK_URL = "https://hook.us2.make.com/2gor8kpwlm6gtpmelge4x8xetfzel0iq";
    const CHATBOT_VERSION = "v1.44";
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");

    function escapeHtml(text) {
  if (!text) return "";

  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function makeBotLinksClickable(text) {
  if (!text) return "";

  let safeText = escapeHtml(text);

  // Convert Markdown links: [Label](https://example.com)
  safeText = safeText.replace(
    /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
    function (match, label, url) {
      return `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`;
    }
  );

  // Convert raw URLs into clickable links
  safeText = safeText.replace(
    /(^|[^"'>])(https?:\/\/[^\s<]+)/g,
    function (match, prefix, url) {
      let cleanUrl = url;
      let trailing = "";

      while (/[.,!?)]$/.test(cleanUrl)) {
        trailing = cleanUrl.slice(-1) + trailing;
        cleanUrl = cleanUrl.slice(0, -1);
      }

      return `${prefix}<a href="${cleanUrl}" target="_blank" rel="noopener noreferrer">${cleanUrl}</a>${trailing}`;
    }
  );

  safeText = safeText.replace(/\n/g, "<br>");

  return safeText;
}
    function addMessage(text, sender, isTyping = false) {
      const msg = document.createElement("div");
      msg.classList.add("message", sender);

      if (isTyping) {
        msg.classList.add("typing");
      }

      const senderName = String(sender || "").toLowerCase();

const isBotMessage =
  senderName.includes("bot") ||
  senderName.includes("ai") ||
  senderName.includes("assistant") ||
  senderName.includes("received");

if (isBotMessage && !isTyping) {
  msg.innerHTML = makeBotLinksClickable(text);
} else {
  msg.textContent = text;
}
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;

      return msg;
    }
let customerName = localStorage.getItem("customerName") || "";
let nameAttempted = localStorage.getItem("nameAttempted") || "false";
function extractName(input) {
    let trimmed = input.trim();

    // Name-introduction prefixes.
    // Add more phrases here later if real chats show new patterns.
    // Examples:
    // "Mijn naam is Marco" -> Marco
    // "Mijn voornaam is Silvio" -> Silvio
    // "Ik ben Marc, hebben jullie WiFi?" -> Marc
    const prefixes = [
        /^my name is\s+/i,
        /^my first name is\s+/i,
        /^first name is\s+/i,
        /^i am\s+/i,
        /^i'm\s+/i,
        /^mijn naam is\s+/i,
        /^mijn voornaam is\s+/i,
        /^voornaam is\s+/i,
        /^ik ben\s+/i
    ];

    let prefixFound = false;

    // Strip recognized prefix.
    // Example: "Ik ben Marco Polo" becomes "Marco Polo".
    for (const prefix of prefixes) {
        if (prefix.test(trimmed)) {
            trimmed = trimmed.replace(prefix, "").trim();
            prefixFound = true;
            break;
        }
    }
    // If no prefix was found, only accept a direct 1–2 word name.
    // This prevents normal questions like "Wat zijn jullie prijzen?"
    // from being incorrectly treated as a name.
    if (!prefixFound) {
    if (trimmed.includes("?")) return null;

    const directWords = trimmed.split(/\s+/).filter(Boolean);

    if (directWords.length < 1 || directWords.length > 2) return null;
    if (trimmed.length > 25) return null;
    if (!/^[A-Za-zÀ-ÿ\s'-]+$/.test(trimmed)) return null;

    return trimmed;
}
    // If a prefix was found, cut off everything after punctuation.
    // Example: "Ik ben Marc, hebben jullie WiFi?" becomes "Marc".
    if (prefixFound) {
        trimmed = trimmed.split(/[,.!?]/)[0].trim();
    }

    // Stop words are common question/action words.
    // If one appears after a name prefix, name extraction stops before that word.
    // This helps extract "Marco Polo" from:
    // "Ik ben Marco Polo hebben jullie WiFi?"
    // You can safely add more words later when real tests show wrong extraction.
    const stopWords = [
        "en",
        "hebben",
        "heb",
        "kan",
        "kun",
        "kunt",
        "wil",
        "willen",
        "zoek",
        "zoeken",
        "vraag",
        "afspraak",
        "wifi",
        "prijzen",
        "prijs",
        "kosten",
        "kost",
        "appartement",
        "appartementen",
        "apartment",
        "apartments",
        "massage",
        "pedicure",
        "manicure",
        "boeken",
        "boeking",
        "beschikbaar",
        "beschikbaarheid",
        "do",
        "can",
        "have",
        "want",
        "need",
        "looking",
        "book",
        "booking",
        "price",
        "prices",
        "cost",
        "appointment",
        "available",
        "availability"
    ];

    const words = trimmed.split(/\s+/).filter(Boolean);
    const nameWords = [];

    for (const word of words) {
        const cleanWord = word.toLowerCase().replace(/[^a-zà-ÿ'-]/gi, "");

        if (stopWords.includes(cleanWord)) {
            break;
        }

        nameWords.push(word);

        // Allow maximum 2 name words.
        // Examples accepted: "Marc", "Marco Polo", "Mary Ann".
        if (nameWords.length >= 2) {
            break;
        }
    }

    trimmed = nameWords.join(" ").trim();

    // Reject empty result.
    if (!trimmed) return null;

    // Prevent overly long entries.
    if (trimmed.length > 25) return null;

    // Accept letters, accents, apostrophes, hyphens and spaces only.
    if (!/^[A-Za-zÀ-ÿ\s'-]+$/.test(trimmed)) return null;

    return trimmed;
}
    function handleKeyPress(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      const SESSION_TIMEOUT = 60 * 60 * 1000; // 1 hour
      const now = Date.now();

      const lastActivity = localStorage.getItem("lastActivity");

      if (!lastActivity || now - parseInt(lastActivity) > SESSION_TIMEOUT) {
      localStorage.removeItem("customerName");
      localStorage.removeItem("nameAttempted");
      customerName = "";
      nameAttempted = "false";  
      }

      localStorage.setItem("lastActivity", now);
      if (!message) return;
      
// If the visitor was previously logged as Gast / Guest,
// but later provides a valid name, overwrite the temporary guest name.
// This keeps Google Sheet logging cleaner for future messages.
const possibleNameUpdate = extractName(message);

if ((customerName === "Gast / Guest" || customerName === "Unknown") && possibleNameUpdate) {
    addMessage(message, "user");

    customerName = possibleNameUpdate;
    localStorage.setItem("customerName", customerName);
    localStorage.removeItem("nameAttempted");
    nameAttempted = "false";

    addMessage(`Leuk je naam te leren kennen, ${customerName}! 😊 Hoe kan ik je verder helpen?`, "bot");
    userInput.value = "";
    return;
}
// NAME CAPTURE LOGIC START
if (!customerName) {
    const extractedName = extractName(message);

    if (extractedName) {
        addMessage(message, "user");
        customerName = extractedName;
        localStorage.setItem("customerName", customerName);
        localStorage.removeItem("nameAttempted");
        nameAttempted = "false";

        addMessage(`Leuk uw naam te leren kennen, ${customerName}! 😊 Hoe kan ik u verder helpen?`, "bot");
        userInput.value = "";
        return;

    } else if (nameAttempted !== "true") {
        addMessage(message, "user");
        
        localStorage.setItem("nameAttempted", "true");
        nameAttempted = "true";

        addMessage("Sorry 😊 Geef alstublieft alleen uw VOORNAAM / Please only provide your FIRST NAME.", "bot");
        userInput.value = "";
        return;

    } else {
        addMessage(message, "user");
        customerName = "Gast / Guest";
        localStorage.setItem("customerName", customerName);
        localStorage.removeItem("nameAttempted");
        nameAttempted = "false";

        addMessage("Geen probleem 😊 Ik help u graag verder. Waarmee kan ik u helpen?", "bot");
        userInput.value = "";
        return;
    }
}

// NAME CAPTURE LOGIC END
      console.log("SEND FUNCTION TRIGGERED");
      addMessage(message, "user");
      userInput.value = "";

      const typingBubble = addMessage("Typing...", "bot", true);

      try {
        console.log("Sending to webhook:", message);

        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
               name: customerName,
               message: message
          })
        });

        const rawText = await response.text();
        console.log("RAW RESPONSE:", rawText);

        let reply = "";

        try {
          const data = JSON.parse(rawText);
          console.log("PARSED DATA:", data);

          reply =
            data.reply ||
            data.result ||
            data.response ||
            "No reply received from AI.";
        } catch (jsonError) {
          console.log("JSON parse failed, using raw text.");
          reply = rawText || "Error connecting to AI.";
        }

        typingBubble.remove();
        addMessage(reply, "bot");

      } catch (error) {
        console.error("FETCH ERROR:", error);
        typingBubble.remove();
        addMessage("Error connecting to AI.", "bot");
      }
    }

    // Optional welcome message
    window.onload = () => {
      addMessage("Hallo / Hello 😊 Ik ben de AI assistent van JoBeth Salon en LoveFaithHope Apartments. Wat is uw VOORNAAM / FIRST NAME?", "bot");
    };
  </script>
